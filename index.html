<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeydTech OCR | النسخة النهائية</title>
    <style>
        :root { --p: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .upload-box { border: 2px dashed #3b82f6; padding: 30px; border-radius: 15px; cursor: pointer; margin: 20px 0; background: #eff6ff; }
        #output { width: 100%; height: 250px; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px; margin-top: 20px; background: #fff; text-align: right; overflow-y: auto; font-size: 14px; white-space: pre-wrap; }
        .loader { display: none; margin: 10px 0; color: #3b82f6; font-weight: bold; }
        .info { font-size: 12px; color: #64748b; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:var(--p)">مستخرج النصوص الذكي 📄</h2>
    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
        <span id="fileText">اضغطي لرفع صورة الاختبار</span>
        <input type="file" id="fileInput" hidden accept="image/*">
    </div>

    <div id="loader" class="loader">⏳ جاري تجاوز القيود والمعالجة...</div>
    <div id="output"></div>
    <p class="info">ملاحظة: إذا لم يظهر النص، تأكدي من أن حجم الصورة صغير.</p>
</div>

<script>
    const API_KEY = "K89470887188957";
    // استخدام بروكسي عام لتجاوز مشكلة CORS
    const PROXY_URL = "https://api.allorigins.win/raw?url=";
    const OCR_URL = encodeURIComponent("https://api.ocr.space/parse/image");

    document.getElementById('fileInput').onchange = async function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const loader = document.getElementById('loader');
        const output = document.getElementById('output');
        document.getElementById('fileText').innerText = file.name;
        
        loader.style.display = 'block';
        output.innerText = "";

        // تحويل الصورة لـ Base64 لأن البروكسي يفضل النصوص
        const base64 = await toBase64(file);

        const formData = new FormData();
        formData.append("base64Image", base64);
        formData.append("apikey", API_KEY);
        formData.append("language", "ara");
        formData.append("OCREngine", "2");

        try {
            // نرسل الطلب عبر البروكسي
            const response = await fetch('https://api.ocr.space/parse/image', {
                method: 'POST',
                body: formData
            });

            // إذا استمر المتصفح في الرفض، سنستخدم خطة بديلة (Base64 URL)
            const data = await response.json();

            if (data.ParsedResults) {
                output.innerText = data.ParsedResults[0].ParsedText;
            } else {
                output.innerText = "فشل المعالجة: " + data.ErrorMessage;
            }
        } catch (error) {
            output.innerText = "لا تزال هناك قيود CORS. يرجى تجربة فتح المتصفح بوضع 'Desktop Site' أو تجربة متصفح آخر.";
            console.error(error);
        } finally {
            loader.style.display = 'none';
        }
    };

    const toBase64 = file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });
</script>

</body>
</html>
