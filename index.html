<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دردشة ZeydTech</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #0b141a; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #1c272f; padding: 15px; text-align: center; border-bottom: 2px solid #00a884; font-weight: bold; }
        #chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px; border-radius: 10px; background: #1c272f; max-width: 85%; font-size: 14px; align-self: flex-start; border-right: 3px solid #00a884; }
        .my-msg { align-self: flex-end; background: #005c4b; border-right: none; border-left: 3px solid #fff; }
        .user-name { display: block; font-size: 11px; color: #00a884; font-weight: bold; margin-bottom: 3px; }
        .footer { background: #121b22; padding: 10px; display: flex; gap: 8px; border-top: 1px solid #2a3942; }
        input { flex: 1; background: #2a3942; border: 1px solid #3b4a54; color: white; padding: 12px; border-radius: 20px; outline: none; }
        button { background: #00a884; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

<header>دردشة ZeydTech الحية</header>
<div id="chat-container"></div>
<div class="footer">
    <input type="text" id="msgInput" placeholder="اكتبي رسالة للجميع..." autocomplete="off">
    <button onclick="sendMsg()">🚀</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const BOT_TOKEN = "8649626005:AAEghmmvR1ykEdPqGxWBoOhHr3ZGb1bFBys";
    const CHANNEL_ID = "@fastfoodt";
    const myName = tg.initDataUnsafe?.user?.first_name || "مستخدم";
    let lastUpdateId = 0;

    async function sendMsg() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text) return;

        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHANNEL_ID,
                    text: `<b>${myName}</b>: ${text}`,
                    parse_mode: 'HTML'
                })
            });
            input.value = '';
            fetchUpdates(); // تحديث فوري بعد الإرسال
        } catch (e) { console.error(e); }
    }

    async function fetchUpdates() {
        try {
            // جلب التحديثات من البوت مباشرة
            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}&timeout=30`);
            const data = await response.json();

            if (data.ok && data.result.length > 0) {
                data.result.forEach(update => {
                    lastUpdateId = update.update_id;
                    const message = update.channel_post || update.message;
                    if (message && message.text) {
                        renderMsg(message.text);
                    }
                });
            }
        } catch (e) { console.log("إعادة المحاولة..."); }
    }

    function renderMsg(fullText) {
        const container = document.getElementById('chat-container');
        const isMine = fullText.startsWith(myName);
        
        const div = document.createElement('div');
        div.className = `msg ${isMine ? 'my-msg' : ''}`;
        
        // استخراج الاسم والنص
        const splitText = fullText.split(': ');
        const user = splitText[0] || "مجهول";
        const content = splitText[1] || fullText;

        div.innerHTML = `<span class="user-name">${user}</span>${content}`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    // تشغيل الجلب اللحظي
    setInterval(fetchUpdates, 2000);
</script>
</body>
</html>
