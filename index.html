<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZeydTech Chat</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: #0b141a;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* رأس الصفحة */
        header {
            background: #1c272f;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            border-bottom: 2px solid #00a884;
        }

        /* صندوق الإدخال في الأعلى لضمان ظهوره */
        .input-section {
            background: #121b22;
            padding: 15px;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid #2a3942;
        }

        input {
            flex: 1;
            background: #2a3942;
            border: 1px solid #00a884;
            color: white;
            padding: 12px;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
        }

        button {
            background: #00a884;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        /* منطقة عرض الرسائل */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            padding: 10px;
            border-radius: 10px;
            background: #1c272f;
            max-width: 85%;
            font-size: 14px;
            line-height: 1.4;
        }

        .user-label {
            color: #00a884;
            font-weight: bold;
            display: block;
            margin-bottom: 3px;
        }
    </style>
</head>
<body>

<header>دردشة ZeydTech الجماعية</header>

<div class="input-section">
    <input type="text" id="msgInput" placeholder="اكتبي رسالتك هنا..." autocomplete="off">
    <button onclick="sendMessage()">إرسال</button>
</div>

<div id="chat-container">
    <div class="message">
        <span class="user-label">النظام:</span>
        أهلاً بكِ! خانة الكتابة الآن في الأعلى. جربي كتابة رسالة واضغطي "إرسال".
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const BOT_TOKEN = "8649626005:AAEghmmvR1ykEdPqGxWBoOhHr3ZGb1bFBys";
    const CHANNEL_ID = "@fastfoodt";

    async function sendMessage() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        const chatContainer = document.getElementById('chat-container');
        const user = tg.initDataUnsafe?.user?.first_name || "مستخدم";

        if (!text) return;

        // إظهار الرسالة في التطبيق
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message';
        msgDiv.innerHTML = `<span class="user-label">أنتِ:</span>${text}`;
        chatContainer.prepend(msgDiv); // تظهر في الأعلى فوراً

        input.value = '';
        tg.HapticFeedback.impactOccurred('medium');

        // إرسال الرسالة للقناة
        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHANNEL_ID,
                    text: `<b>👤 ${user}:</b>\n${text}`,
                    parse_mode: 'HTML'
                })
            });
        } catch (e) { console.error("خطأ"); }
    }
</script>
</body>
</html>
