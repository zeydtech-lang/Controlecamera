<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستخرج النصوص الذكي | ZeydTech</title>
    <style>
        :root { --p: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .upload-box { border: 2px dashed #3b82f6; padding: 30px; border-radius: 15px; cursor: pointer; margin: 20px 0; background: #eff6ff; }
        #output { width: 100%; height: 200px; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px; margin-top: 20px; background: #fff; text-align: right; overflow-y: auto; font-size: 14px; white-space: pre-wrap; }
        .loader { display: none; margin: 10px 0; color: #3b82f6; font-weight: bold; }
        .error-msg { color: #ef4444; font-size: 13px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:var(--p)">مستخرج النصوص الذكي 📄</h2>
    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
        <span id="fileText">اضغطي هنا لرفع الصورة</span>
        <input type="file" id="fileInput" hidden accept="image/*">
    </div>

    <div id="loader" class="loader">⏳ جاري المعالجة...</div>
    <div id="output"></div>
    <div id="errorLog" class="error-msg"></div>
</div>

<script>
    // تأكدي من أن هذا المفتاح لا يزال يعمل (K89470887188957)
    const API_KEY = "K89470887188957";

    document.getElementById('fileInput').onchange = async function(e) {
        const file = e.target.files[0];
        if (!file) return;

        // فحص حجم الملف (إذا كان أكبر من 1MB قد يرفضه السيرفر في النسخة المجانية)
        if (file.size > 1024 * 1024) {
            alert("الصورة كبيرة جداً، يرجى اختيار صورة أقل من 1 ميجابايت للتجربة.");
            return;
        }

        const loader = document.getElementById('loader');
        const output = document.getElementById('output');
        const errorLog = document.getElementById('errorLog');
        
        document.getElementById('fileText').innerText = file.name;
        loader.style.display = 'block';
        output.innerText = "";
        errorLog.innerText = "";

        const formData = new FormData();
        formData.append("file", file);
        formData.append("apikey", API_KEY);
        formData.append("language", "ara");
        formData.append("OCREngine", "2");

        try {
            const response = await fetch('https://api.ocr.space/parse/image', {
                method: 'POST',
                body: formData // إرسال كـ FormData هو الأفضل للمتصفحات الحديثة
            });

            const data = await response.json();

            if (data.OCRExitCode === 1) {
                output.innerText = data.ParsedResults[0].ParsedText;
            } else {
                errorLog.innerText = "فشل السيرفر: " + data.ErrorMessage;
            }
        } catch (error) {
            errorLog.innerText = "خطأ في الشبكة أو CORS. جربي رفع الكود على GitHub Pages أو استخدام متصفح خفي (Incognito).";
            console.error(error);
        } finally {
            loader.style.display = 'none';
        }
    };
</script>

</body>
</html>
