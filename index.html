<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZeydTech Telegram Chat</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #0b141a; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #1c272f; padding: 12px; text-align: center; border-bottom: 2px solid #00a884; font-weight: bold; font-size: 14px; }
        
        #chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-color: #0b141a; }
        
        .message { padding: 10px; border-radius: 12px; background: #1c272f; max-width: 85%; font-size: 14px; line-height: 1.4; position: relative; animation: fadeIn 0.3s; }
        .my-message { align-self: flex-end; background: #005c4b; border-bottom-right-radius: 2px; }
        .other-message { align-self: flex-start; background: #202c33; border-bottom-left-radius: 2px; }
        
        .user-name { display: block; font-size: 11px; color: #00a884; font-weight: bold; margin-bottom: 3px; }
        
        .input-area { background: #1c272f; padding: 10px; display: flex; gap: 8px; border-top: 1px solid #2a3942; }
        input { flex: 1; background: #2a3942; border: 1px solid #3b4a54; color: white; padding: 12px; border-radius: 20px; outline: none; }
        button { background: #00a884; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>دردشة ZeydTech الجماعية</header>

<div id="chat-container">
    </div>

<div class="input-area">
    <input type="text" id="msgInput" placeholder="اكتب رسالة للجميع..." autocomplete="off">
    <button onclick="sendMessage()">🚀</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const BOT_TOKEN = "8649626005:AAEghmmvR1ykEdPqGxWBoOhHr3ZGb1bFBys";
    const CHANNEL_ID = "@fastfoodt";
    const myName = tg.initDataUnsafe?.user?.first_name || "مستخدم";
    
    let lastUpdateId = 0;

    // 1. وظيفة إرسال الرسالة للقناة
    async function sendMessage() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text) return;

        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHANNEL_ID,
                    text: `<b>${myName}</b>: ${text}`,
                    parse_mode: 'HTML'
                })
            });
            input.value = '';
            tg.HapticFeedback.impactOccurred('light');
        } catch (e) { console.error("خطأ في الإرسال"); }
    }

    // 2. وظيفة جلب الرسائل الجديدة (هذه تجعل الكلام يظهر للجميع)
    async function getUpdates() {
        try {
            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}`);
            const data = await response.json();

            if (data.ok && data.result.length > 0) {
                data.result.forEach(update => {
                    lastUpdateId = update.update_id;
                    
                    // نتحقق إذا كانت الرسالة مرسلة للقناة أو من البوت
                    const msg = update.channel_post || update.message;
                    if (msg && msg.text) {
                        displayMessage(msg.text);
                    }
                });
            }
        } catch (e) { console.error("خطأ في جلب البيانات"); }
    }

    function displayMessage(fullText) {
        const container = document.getElementById('chat-container');
        const isMyMsg = fullText.includes(myName);
        
        // تقسيم النص لمعرفة الاسم والمحتوى
        const parts = fullText.split(': ');
        const sender = parts[0] || "مجهول";
        const content = parts[1] || fullText;

        const div = document.createElement('div');
        div.className = `message ${isMyMsg ? 'my-message' : 'other-message'}`;
        div.innerHTML = `<span class="user-name">${sender}</span>${content}`;
        
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    // تحديث المحادثة كل 2 ثانية لجلب رسائل الآخرين
    setInterval(getUpdates, 2000);

    // جلب الرسائل عند الفتح لأول مرة
    getUpdates();
</script>
</body>
</html>
