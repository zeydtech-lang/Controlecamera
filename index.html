<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المراقبة البسيط - Controlcamera</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/push.js/1.0.8/push.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 10px; }
        .container { background: #1e1e1e; border-radius: 12px; padding: 15px; max-width: 400px; margin: auto; }
        #status { font-size: 0.8rem; color: #2ecc71; margin-bottom: 10px; }
        video { width: 100%; border-radius: 8px; background: #000; border: 1px solid #333; }
        #chat-box { height: 300px; overflow-y: auto; background: #252525; border-radius: 8px; padding: 10px; margin-top: 15px; border: 1px solid #444; }
        .msg { background: #333; margin-bottom: 8px; padding: 10px; border-radius: 8px; text-align: right; border-right: 4px solid #007bff; }
        .alert { border-right: 4px solid #ff4757; color: #ff4757; background: #3d1b1b; font-weight: bold; }
        .controls { display: flex; gap: 5px; margin-top: 10px; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: 1px solid #444; background: #2d2d2d; color: white; }
        button { padding: 12px 15px; background: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>المراقب البسيط 🛡️</h2>
    <div id="status">جاري الاتصال...</div>
    
    <video id="video" autoplay playsinline muted></video>
    
    <div id="chat-box"></div>

    <div class="controls">
        <input type="text" id="msgInput" placeholder="رسالة سريعة...">
        <button onclick="sendManual()">إرسال</button>
    </div>
</div>

<script>
    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyAW3yfrREROLkp8E4MvGB8srTovzxb0VsI",
        authDomain: "controlcamera.firebaseapp.com",
        databaseURL: "https://controlcamera-default-rtdb.firebaseio.com/",
        projectId: "controlcamera",
        storageBucket: "controlcamera.firebasestorage.app",
        messagingSenderId: "218315302257",
        appId: "1:218315302257:web:39f4746cae5730308902d0"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('simple_monitor');

    const video = document.getElementById('video');
    const chatBox = document.getElementById('chat-box');
    let lastFrame = null;

    // طلب إذن الإشعارات
    Push.Permission.request();

    // تشغيل الكاميرا
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
    .then(stream => {
        video.srcObject = stream;
        document.getElementById('status').innerText = "النظام يعمل الآن ✅";
        setInterval(detectMotion, 1000); // فحص الحركة كل ثانية
    })
    .catch(() => {
        document.getElementById('status').innerText = "وضع الاستقبال فقط";
        video.style.display = "none";
    });

    // كود اكتشاف الحركة البرمجي (بدون ذكاء اصطناعي)
    function detectMotion() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 40; canvas.height = 40; // تصغير جداً لتوفير المعالج
        ctx.drawImage(video, 0, 0, 40, 40);
        const currentFrame = ctx.getImageData(0, 0, 40, 40).data;

        if (lastFrame) {
            let change = 0;
            for (let i = 0; i < currentFrame.length; i += 4) {
                // حساب الفرق بين الإطار الحالي والسابق
                const diff = Math.abs(currentFrame[i] - lastFrame[i]);
                if (diff > 50) change++; 
            }
            // إذا تحرك أكثر من 10% من الصورة، أرسل تنبيهاً
            if (change > 160) { 
                postToFirebase("⚠️ حركة مكتشفة!", "alert");
            }
        }
        lastFrame = currentFrame;
    }

    function postToFirebase(text, type) {
        db.push().set({
            text: text,
            time: new Date().toLocaleTimeString('ar-DZ'),
            type: type
        });
    }

    function sendManual() {
        const input = document.getElementById('msgInput');
        if (input.value) {
            postToFirebase(input.value, "msg");
            input.value = "";
        }
    }

    // استقبال البيانات وإصدار الإشعارات
    db.limitToLast(1).on('child_added', (snap) => {
        const d = snap.val();
        const div = document.createElement('div');
        div.className = `msg ${d.type === 'alert' ? 'alert' : ''}`;
        div.innerHTML = `<small>${d.time}</small><br>${d.text}`;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;

        if (d.type === 'alert') {
            // إشعار منبثق يهز الهاتف
            Push.create("تنبيه من الكاميرا", {
                body: d.text,
                timeout: 5000,
                onClick: function () { window.focus(); this.close(); }
            });
            if (navigator.vibrate) navigator.vibrate(500);
        }
    });
</script>
</body>
</html>
