<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الحارس - الإصدار الاحترافي 🛡️</title>
    <style>
        :root { --primary: #3b82f6; --danger: #ef4444; --bg: #0f172a; --card: #1e293b; }
        body { background: var(--bg); color: white; text-align: center; font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 15px; }
        
        .container { background: var(--card); border-radius: 25px; padding: 25px; max-width: 450px; margin: 20px auto; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        h2 { color: var(--primary); margin-bottom: 20px; font-size: 1.5rem; }

        #preview-box { position: relative; width: 100%; border-radius: 18px; overflow: hidden; background: #000; border: 2px solid var(--primary); margin-bottom: 20px; }
        video { width: 100%; display: block; }

        .btn-live { 
            background: linear-gradient(135deg, var(--danger), #b91c1c); 
            color: white; width: 100%; padding: 18px; border-radius: 15px; 
            border: none; font-weight: bold; cursor: pointer; font-size: 1.1rem;
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4); transition: 0.3s;
        }
        .btn-live:active { transform: scale(0.97); }

        #status { margin-top: 15px; font-size: 0.9rem; font-weight: 500; color: #fbbf24; }
        .success-msg { color: #4ade80 !important; }
        .error-msg { color: #f87171 !important; }
    </style>
</head>
<body>

    <div class="container">
        <h2>نظام البث الاحترافي</h2>
        
        <div id="preview-box">
            <video id="preview" autoplay playsinline muted></video>
        </div>

        <button class="btn-live" onclick="launchSecureLive()">🔴 تشغيل البث وإرسال الرابط</button>
        
        <div id="status">النظام جاهز.. اضغط لبدء البث المباشر</div>
    </div>

    <script>
        // إعدادات البوت الخاصة بكِ
        const TOKEN = "8799708539:AAFFvqiwSvFBTACNrnZtOO5noYErlLsc958";
        const CHAT_ID = "1734714029";
        
        let localStream = null;

        // 1. تشغيل الكاميرا فور فتح الصفحة للمعاينة
        async function startCamera() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: 1280 },
                    audio: true 
                });
                document.getElementById('preview').srcObject = localStream;
            } catch (e) {
                const statusTxt = document.getElementById('status');
                statusTxt.innerText = "⚠️ خطأ: يرجى تفعيل الكاميرا واستخدام رابط آمن (HTTPS)";
                statusTxt.className = "error-msg";
            }
        }

        // 2. معالجة الإرسال والانتقال للبث
        async function launchSecureLive() {
            const statusTxt = document.getElementById('status');
            statusTxt.innerText = "⏳ جاري إرسال الرابط لتليجرام...";
            statusTxt.className = "";

            const streamKey = "VIP_Guard_" + Math.floor(Math.random() * 9999);
            const pushURL = `https://vdo.ninja/?push=${streamKey}&autostart&clean&mute&vcodec=h264&bitrate=2000`;
            const viewURL = `https://vdo.ninja/?view=${streamKey}&autoplay=1&clock=1`;

            // نص الرسالة
            const message = `✅ **تم بدء بث فيديو جديد!**\n\nرابط المشاهدة:\n${viewURL}`;

            try {
                // محاولة إرسال الرابط لتليجرام
                const response = await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                    method: "POST",
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        chat_id: CHAT_ID, 
                        text: message,
                        parse_mode: "Markdown"
                    })
                });

                if (response.ok) {
                    statusTxt.innerText = "✅ تم الإرسال! جاري تحويل الكاميرا للبث...";
                    statusTxt.className = "success-msg";

                    // إيقاف الكاميرا المحلية لتحريرها قبل الانتقال
                    if (localStream) {
                        localStream.getTracks().forEach(track => track.stop());
                    }

                    // الانتقال لصفحة البث في نفس النافذة لضمان العمل 100%
                    setTimeout(() => {
                        window.location.href = pushURL;
                    }, 1000);
                } else {
                    throw new Error("فشل الإرسال");
                }
            } catch (error) {
                statusTxt.innerText = "❌ فشل الإرسال. تأكدي من الإنترنت أو ارفعي الملف على استضافة HTTPS.";
                statusTxt.className = "error-msg";
                console.error(error);
            }
        }

        // بدء التشغيل
        startCamera();
    </script>
</body>
</html>
