<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق الاختبارات الذكي - Gemini 2.5</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f1f5f9;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .app-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        .upload-area {
            border: 2px dashed var(--primary);
            padding: 30px;
            border-radius: 12px;
            background: #f8fafc;
            margin: 20px 0;
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #94a3b8; }

        #loadingStatus {
            display: none;
            color: var(--primary);
            margin: 15px 0;
            font-weight: bold;
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 50% { opacity: 0.5; } }

        #resultFrame {
            width: 100%;
            height: 600px;
            border: 1px solid #ddd;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1>مولد الكويزات (Gemini 2.5 Flash) 🚀</h1>
    <p>ارفعي صورة الاختبار وسيقوم الذكاء الاصطناعي ببرمجة التطبيق لكِ فوراً</p>

    <div class="upload-area">
        <input type="file" id="imageSelector" accept="image/*">
        <br><br>
        <button id="startBtn">تحويل الصورة إلى تطبيق</button>
    </div>

    <div id="loadingStatus">⏳ جاري معالجة الصورة عبر Gemini 2.5...</div>
    
    <iframe id="resultFrame"></iframe>
</div>

<script>
    // المفتاح الخاص بكِ
    const API_KEY = "AIzaSyB5q7_dbQ9N3gO2SnzBaoA0PUMz3hBjma8";
    // تحديث الرابط لنسخة 2.5 (إذا كانت متوفرة في منطقتك) أو 1.5 المستقرة
    const MODEL = "gemini-1.5-flash"; // ملاحظة: 1.5 فلاش هي الأكثر استقراراً حالياً للرؤية
    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`;

    const imageSelector = document.getElementById('imageSelector');
    const startBtn = document.getElementById('startBtn');
    const loadingStatus = document.getElementById('loadingStatus');
    const resultFrame = document.getElementById('resultFrame');

    startBtn.addEventListener('click', async () => {
        const file = imageSelector.files[0];
        if (!file) return alert("يرجى اختيار صورة");

        startBtn.disabled = true;
        loadingStatus.style.display = 'block';
        resultFrame.style.display = 'none';

        try {
            const base64Data = await convertImageToBase64(file);
            const htmlCode = await fetchFromGemini(base64Data);
            
            renderResponse(htmlCode);
        } catch (error) {
            console.error(error);
            alert("خطأ: تأكدي من تشغيل الملف عبر Server (مثل Live Server) وليس كملف عادي.");
        } finally {
            startBtn.disabled = false;
            loadingStatus.style.display = 'none';
        }
    });

    function convertImageToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = e => reject(e);
        });
    }

    async function fetchFromGemini(base64) {
        const prompt = "You are an expert web developer. Analyze this exam image and create a COMPLETE interactive HTML/CSS/JS quiz. Return ONLY the raw HTML code without any markdown formatting or backticks. The quiz must be in Arabic, beautiful, and mobile-friendly.";

        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{
                    parts: [
                        { text: prompt },
                        { inline_data: { mime_type: "image/jpeg", data: base64 } }
                    ]
                }]
            })
        });

        const json = await response.json();
        if (json.error) throw new Error(json.error.message);
        
        let code = json.candidates[0].content.parts[0].text;
        // تنظيف الكود في حال أضاف الذكاء الاصطناعي علامات البرمجة
        return code.replace(/```html|```/gi, "").trim();
    }

    function renderResponse(html) {
        resultFrame.style.display = 'block';
        const doc = resultFrame.contentWindow.document;
        doc.open();
        doc.write(html);
        doc.close();
        resultFrame.scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
