<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المراقبة الاحترافي</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; margin: 0; padding: 10px; }
        h2 { color: #007bff; margin-bottom: 5px; }
        #chat-box { height: 280px; overflow-y: auto; background: #222; border: 1px solid #444; margin: 10px auto; padding: 10px; width: 95%; border-radius: 8px; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: #333; padding: 10px; border-radius: 8px; text-align: right; border-right: 4px solid #007bff; font-size: 0.9rem; }
        .alert { border-right: 4px solid #ff4757; color: #ff4757; background: #3d1b1b; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.7; } }
        video { width: 100%; max-width: 350px; border-radius: 10px; border: 2px solid #444; background: #000; margin-top: 5px; }
        img { max-width: 100%; border-radius: 5px; margin-top: 10px; border: 1px solid #555; }
        .controls { display: flex; flex-direction: column; gap: 8px; align-items: center; padding: 5px; }
        button { padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; width: 95%; transition: 0.3s; }
        
        .btn-request { background: #6f42c1; font-size: 1rem; } /* طلب لقطة */
        .btn-toggle-on { background: #28a745; } /* تشغيل */
        .btn-toggle-off { background: #dc3545; } /* تعطيل */
        .btn-stop { background: #ffc107; color: black; display: none; }
        .btn-delete { background: #444; font-size: 0.8rem; margin-top: 15px; }
        
        .status { color: #ffcc00; font-size: 0.85rem; margin-bottom: 10px; padding: 8px; border: 1px dashed #ffcc00; cursor: pointer; }
    </style>
</head>
<body>

    <h2>نظام المراقبة الذكي 🛡️</h2>
    
    <audio id="phoneAlarm" src="https://actions.google.com/sounds/v1/alarms/emergency_it_is_an_emergency.ogg" loop preload="auto"></audio>
    
    <div class="status" id="status" onclick="enableAudio()">⚠️ انقر هنا لتفعيل التنبيهات (صوت/اهتزاز)</div>

    <div class="controls">
        <button class="btn-request" onclick="requestRemotePhoto()">📸 اطلب لقطة من الهاتف الآخر</button>
        <button id="camToggleBtn" class="btn-toggle-off" onclick="toggleCamera()">🔴 تعطيل الكاميرا المحلية</button>
        
        <video id="video" autoplay playsinline muted></video>
        
        <button id="stopBtn" class="btn-stop" onclick="stopAlarm()">🔕 إيقاف الإنذار والاهتزاز</button>
    </div>

    <div id="chat-box"></div>

    <button class="btn-delete" onclick="clearData()">🗑️ مسح جميع السجلات</button>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyAW3yfrREROLkp8E4MvGB8srTovzxb0VsI",
            authDomain: "controlcamera.firebaseapp.com",
            databaseURL: "https://controlcamera-default-rtdb.firebaseio.com/",
            projectId: "controlcamera",
            storageBucket: "controlcamera.firebasestorage.app",
            messagingSenderId: "218315302257",
            appId: "1:218315302257:web:39f4746cae5730308902d0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const logsRef = db.ref('secure_logs');
        const cmdRef = db.ref('commands');

        const videoElement = document.getElementById('video');
        const camToggleBtn = document.getElementById('camToggleBtn');
        const phoneAlarm = document.getElementById('phoneAlarm');
        const stopBtn = document.getElementById('stopBtn');

        let localStream = null;
        let isCamOpen = false;
        let motionInterval = null;
        let lastFrameData = null;

        // 1. تشغيل/تعطيل الكاميرا المحلية
        function toggleCamera() {
            if (isCamOpen) {
                if (localStream) localStream.getTracks().forEach(t => t.stop());
                videoElement.srcObject = null;
                clearInterval(motionInterval);
                isCamOpen = false;
                camToggleBtn.innerText = "🟢 تشغيل الكاميرا المحلية";
                camToggleBtn.className = "btn-toggle-on";
            } else {
                const constraints = { video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } };
                navigator.mediaDevices.getUserMedia(constraints)
                    .then(stream => {
                        localStream = stream;
                        videoElement.srcObject = stream;
                        isCamOpen = true;
                        camToggleBtn.innerText = "🔴 تعطيل الكاميرا المحلية";
                        camToggleBtn.className = "btn-toggle-off";
                        motionInterval = setInterval(detectMotion, 1500);
                    }).catch(err => alert("خطأ في الوصول للكاميرا"));
            }
        }

        // 2. اكتشاف الحركة (تنبيه صامت يرسل للهاتف الآخر)
        function detectMotion() {
            if (!isCamOpen) return;
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 50; canvas.height = 50;
            ctx.drawImage(videoElement, 0, 0, 50, 50);
            const currentFrame = ctx.getImageData(0, 0, 50, 50).data;

            if (lastFrameData) {
                let diff = 0;
                for (let i = 0; i < currentFrame.length; i += 4) {
                    if (Math.abs(currentFrame[i] - lastFrameData[i]) > 50) diff++;
                }
                if (diff > 120) {
                    logsRef.push().set({
                        message: "⚠️ تنبيه: تم رصد حركة أمام الكاميرا!",
                        timestamp: new Date().toLocaleTimeString('ar-DZ'),
                        type: "alert"
                    });
                }
            }
            lastFrameData = currentFrame;
        }

        // 3. التقاط صورة (وضوح متوسط متوازن)
        function captureAndSend(isAuto = false) {
            if (!isCamOpen) return;
            const canvas = document.createElement('canvas');
            const targetWidth = 800; // عرض متوسط واضح
            const scale = targetWidth / videoElement.videoWidth;
            canvas.width = targetWidth;
            canvas.height = videoElement.videoHeight * scale;
            
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
            
            logsRef.push().set({
                message: isAuto ? "📸 لقطة استجابة لطلب عن بعد" : "📸 لقطة يدوية محليّة",
                timestamp: new Date().toLocaleTimeString('ar-DZ'),
                type: "msg",
                image: canvas.toDataURL('image/jpeg', 0.7) // جودة 70%
            });
        }

        // 4. طلب لقطة من الهاتف الآخر
        function requestRemotePhoto() {
            cmdRef.set({ action: "take_photo", time: Date.now() });
            alert("تم إرسال طلب التقاط صورة...");
        }

        // 5. الاستماع للأوامر (للهاتف الذي يعمل ككاميرا)
        cmdRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.action === "take_photo" && isCamOpen) {
                captureAndSend(true);
                cmdRef.set(null); // مسح الأمر بعد التنفيذ
            }
        });

        // 6. التعامل مع التنبيهات المستلمة (صوت واهتزاز)
        logsRef.limitToLast(1).on('child_added', (snapshot) => {
            const data = snapshot.val();
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `msg ${data.type === 'alert' ? 'alert' : ''}`;
            div.innerHTML = `<small>${data.timestamp}</small><br>${data.message}`;
            if (data.image) div.innerHTML += `<br><img src="${data.image}">`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;

            if (data.type === "alert") {
                phoneAlarm.play().catch(() => {});
                if ("vibrate" in navigator) navigator.vibrate([500, 200, 500, 200, 500]);
                stopBtn.style.display = "block";
            }
        });

        function stopAlarm() {
            phoneAlarm.pause();
            phoneAlarm.currentTime = 0;
            if ("vibrate" in navigator) navigator.vibrate(0);
            stopBtn.style.display = "none";
        }

        function enableAudio() {
            phoneAlarm.play().then(() => phoneAlarm.pause());
            document.getElementById('status').innerText = "✅ النظام جاهز ومفعل";
            document.getElementById('status').style.color = "#00ff00";
            document.getElementById('status').style.borderColor = "#00ff00";
        }

        function clearData() {
            if (confirm("هل تريد مسح جميع البيانات؟")) logsRef.remove();
        }

        // تشغيل الكاميرا تلقائياً عند البدء
        toggleCamera();
    </script>
</body>
</html>
