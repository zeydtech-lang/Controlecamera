<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZeydTech Live Chat</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --tg-bg: #0b141a; --tg-sec: #1c272f; --tg-btn: #00a884; }
        body { font-family: sans-serif; background: var(--tg-bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--tg-sec); padding: 15px; text-align: center; border-bottom: 2px solid var(--tg-btn); font-weight: bold; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 14px; border-radius: 12px; background: var(--tg-sec); max-width: 80%; font-size: 14px; align-self: flex-start; position: relative; }
        .my-msg { align-self: flex-end; background: #005c4b; }
        .user { display: block; font-size: 11px; color: var(--tg-btn); font-weight: bold; margin-bottom: 3px; }
        .footer { background: #121b22; padding: 10px; display: flex; gap: 8px; border-top: 1px solid #2a3942; }
        input { flex: 1; background: #2a3942; border: 1px solid #3b4a54; color: white; padding: 12px; border-radius: 20px; outline: none; }
        button { background: var(--tg-btn); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

<header>ZeydTech - دردشة المتصلين الآن</header>

<div id="chat-box">
    </div>

<div class="footer">
    <input type="text" id="msgInput" placeholder="اكتب رسالة للجميع..." autocomplete="off">
    <button onclick="send()">🚀</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const BOT_TOKEN = "8649626005:AAEghmmvR1ykEdPqGxWBoOhHr3ZGb1bFBys";
    // ملاحظة: جلب التحديثات يعمل مع الرسائل الخاصة بالبوت
    // لكي يرى الجميع الرسائل، يجب أن يرسلوا رسالة للبوت أولاً
    let lastId = 0;

    async function send() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        const name = tg.initDataUnsafe?.user?.first_name || "مستخدم";
        if (!text) return;

        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: tg.initDataUnsafe?.user?.id, // يرسل للمستخدم نفسه كنسخة
                    text: `<b>${name}</b>: ${text}`,
                    parse_mode: 'HTML'
                })
            });
            input.value = '';
        } catch (e) { console.error("إرسال فاشل"); }
    }

    async function updateChat() {
        try {
            // استخدام وسيط لتجنب مشاكل المتصفح
            const proxy = "https://api.allorigins.win/get?url=";
            const url = encodeURIComponent(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastId + 1}`);
            
            const response = await fetch(proxy + url);
            const rawData = await response.json();
            const data = JSON.parse(rawData.contents);

            if (data.ok && data.result.length > 0) {
                data.result.forEach(update => {
                    lastId = update.update_id;
                    const m = update.message;
                    if (m && m.text) {
                        display(m.text);
                    }
                });
            }
        } catch (e) { console.log("جاري الانتظار..."); }
    }

    function display(fullText) {
        const box = document.getElementById('chat-box');
        const parts = fullText.split(': ');
        const user = parts[0] || "مجهول";
        const content = parts[1] || fullText;
        
        const isMine = fullText.includes(tg.initDataUnsafe?.user?.first_name);

        const div = document.createElement('div');
        div.className = `msg ${isMine ? 'my-msg' : ''}`;
        div.innerHTML = `<span class="user">${user}</span>${content}`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    // تحديث كل ثانية (سرعة فائقة)
    setInterval(updateChat, 1000);
</script>
</body>
</html>
