<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المراقبة الاحترافي - تحكم كامل</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; text-align: center; margin: 0; padding: 10px; }
        h2 { color: #3b82f6; margin: 15px 0; }
        #chat-box { height: 380px; overflow-y: auto; background: #1e293b; border: 1px solid #334155; margin: 10px auto; padding: 10px; width: 95%; border-radius: 12px; display: flex; flex-direction: column; gap: 10px; box-shadow: inset 0 2px 10px rgba(0,0,0,0.3); }
        .msg { background: #334155; padding: 12px; border-radius: 10px; text-align: right; border-right: 4px solid #3b82f6; font-size: 0.85rem; animation: fadeIn 0.3s; }
        .alert { border-right: 4px solid #ef4444; color: #fca5a5; background: #450a0a; animation: blink 1s infinite; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes blink { 50% { opacity: 0.7; } }
        video { width: 100%; max-width: 400px; border-radius: 15px; border: 3px solid #334155; background: #000; margin: 10px auto; display: block; }
        img { max-width: 100%; border-radius: 8px; margin-top: 8px; border: 1px solid #475569; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; max-width: 500px; margin: 0 auto; }
        button { padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; font-size: 0.9rem; }
        button:active { transform: scale(0.95); }
        
        .btn-alfred { background: #f97316; grid-column: span 2; border: 2px solid #fff; } 
        .btn-back { background: #10b981; grid-column: span 2; } /* زر العودة من ألفيريد */
        .btn-capture { background: #3b82f6; grid-column: span 2; }
        .btn-stream-start { background: #8b5cf6; }
        .btn-stream-stop { background: #64748b; }
        .btn-toggle-cam { background: #ef4444; grid-column: span 2; }
        .btn-stop-alarm { background: #f59e0b; color: #000; grid-column: span 2; display: none; }
        .btn-delete { background: none; color: #94a3b8; font-size: 0.8rem; margin-top: 20px; border: 1px solid #334155; width: auto; align-self: center; }
        
        .status { color: #fbbf24; font-size: 0.85rem; margin-bottom: 10px; padding: 10px; background: rgba(251, 191, 36, 0.1); border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>المراقبة الذكية 🛡️</h2>
    
    <audio id="phoneAlarm" src="https://actions.google.com/sounds/v1/alarms/emergency_it_is_an_emergency.ogg" loop preload="auto"></audio>
    
    <div class="status" id="status" onclick="enableAudio()">🔔 اضغط هنا لتفعيل الصوت والاهتزاز</div>

    <div class="controls">
        <button class="btn-alfred" onclick="remoteCommand('open_alfred')">🚀 فتح Alfred Camera (عن بعد)</button>
        <button class="btn-back" onclick="remoteCommand('back_to_app')">🏠 استعادة الكاميرا (العودة للتطبيق)</button>
        
        <button class="btn-capture" onclick="requestSinglePhoto()">📸 التقاط صورة فورية</button>
        
        <button class="btn-stream-start" onclick="remoteCommand('start_stream')">▶️ بدء البث</button>
        <button class="btn-stream-stop" onclick="remoteCommand('stop_stream')">⏹️ إيقاف</button>
        
        <button id="camToggleBtn" class="btn-toggle-cam" onclick="toggleCamera()">🔴 إيقاف الكاميرا</button>
        
        <button id="stopBtn" class="btn-stop-alarm" onclick="stopAlarm()">🔕 إيقاف الجرس</button>
    </div>

    <video id="video" autoplay playsinline muted></video>

    <div id="chat-box"></div>

    <button class="btn-delete" onclick="clearData()">🗑️ مسح السجل</button>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAW3yfrREROLkp8E4MvGB8srTovzxb0VsI",
            authDomain: "controlcamera.firebaseapp.com",
            databaseURL: "https://controlcamera-default-rtdb.firebaseio.com/",
            projectId: "controlcamera"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const logsRef = db.ref('secure_logs');
        const cmdRef = db.ref('commands');

        const videoElement = document.getElementById('video');
        const camToggleBtn = document.getElementById('camToggleBtn');
        const phoneAlarm = document.getElementById('phoneAlarm');
        const stopBtn = document.getElementById('stopBtn');

        let localStream = null;
        let isCamOpen = false;
        let streamInterval = null;
        let motionInterval = null;
        let lastFrameData = null;

        function toggleCamera(forceOff = false) {
            if (isCamOpen || forceOff) {
                if (localStream) localStream.getTracks().forEach(t => t.stop());
                videoElement.srcObject = null;
                clearInterval(motionInterval);
                isCamOpen = false;
                camToggleBtn.innerText = "🟢 تشغيل الكاميرا";
                camToggleBtn.style.background = "#10b981";
            } else {
                navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1280, height: 720 } })
                .then(stream => {
                    localStream = stream;
                    videoElement.srcObject = stream;
                    isCamOpen = true;
                    camToggleBtn.innerText = "🔴 إيقاف الكاميرا";
                    camToggleBtn.style.background = "#ef4444";
                    motionInterval = setInterval(detectMotion, 2000);
                }).catch(err => alert("خطأ في الكاميرا: " + err));
            }
        }

        function captureAndSend(label) {
            if (!isCamOpen) return;
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 640;
            canvas.height = 480;
            ctx.drawImage(videoElement, 0, 0, 640, 480);
            logsRef.push().set({
                message: label,
                timestamp: new Date().toLocaleTimeString('ar-DZ'),
                type: "msg",
                image: canvas.toDataURL('image/jpeg', 0.5)
            });
        }

        function detectMotion() {
            if (!isCamOpen) return;
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 50; canvas.height = 50;
            ctx.drawImage(videoElement, 0, 0, 50, 50);
            const currentFrame = ctx.getImageData(0, 0, 50, 50).data;
            if (lastFrameData) {
                let diff = 0;
                for (let i = 0; i < currentFrame.length; i += 4) {
                    if (Math.abs(currentFrame[i] - lastFrameData[i]) > 60) diff++;
                }
                if (diff > 100) {
                    logsRef.push().set({ message: "🚨 تنبيه: حركة مكتشفة!", timestamp: new Date().toLocaleTimeString('ar-DZ'), type: "alert" });
                }
            }
            lastFrameData = currentFrame;
        }

        function requestSinglePhoto() {
            cmdRef.set({ action: "take_photo", time: Date.now() });
        }

        function remoteCommand(action) {
            cmdRef.set({ action: action, time: Date.now() });
        }

        // الاستماع للأوامر عن بعد (ينفذ في هاتف المراقبة)
        cmdRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            if (data.action === "open_alfred") {
                toggleCamera(true); // تحرير العدسة
                logsRef.push().set({ message: "🔄 جاري فتح Alfred...", timestamp: new Date().toLocaleTimeString('ar-DZ'), type: "msg" });
                setTimeout(() => {
                    window.location.href = "intent://#Intent;scheme=alfred;package=com.ivuu;end";
                }, 800);
                cmdRef.set(null);
            } 
            else if (data.action === "back_to_app") {
                // محاولة إعادة التركيز وتفعيل الكاميرا
                if ("vibrate" in navigator) navigator.vibrate(500);
                toggleCamera(); 
                logsRef.push().set({ message: "🏠 تم استعادة التحكم بالتطبيق بنجاح", timestamp: new Date().toLocaleTimeString('ar-DZ'), type: "msg" });
                cmdRef.set(null);
            }
            else if (data.action === "take_photo" && isCamOpen) {
                captureAndSend("📸 صورة فورية بطلب عن بعد");
                cmdRef.set(null);
            } 
            else if (data.action === "start_stream" && isCamOpen) {
                if(!streamInterval) streamInterval = setInterval(() => captureAndSend("🎥 لقطة بث مباشر"), 3000);
            } 
            else if (data.action === "stop_stream") {
                clearInterval(streamInterval);
                streamInterval = null;
            }
        });

        logsRef.limitToLast(10).on('child_added', (snapshot) => {
            const data = snapshot.val();
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `msg ${data.type === 'alert' ? 'alert' : ''}`;
            div.innerHTML = `<small>${data.timestamp}</small><br><b>${data.message}</b>`;
            if (data.image) div.innerHTML += `<br><img src="${data.image}">`;
            box.prepend(div);
            if (data.type === "alert") {
                phoneAlarm.play().catch(() => {});
                stopBtn.style.display = "block";
            }
        });

        function stopAlarm() { phoneAlarm.pause(); phoneAlarm.currentTime = 0; stopBtn.style.display = "none"; }
        function enableAudio() { phoneAlarm.play().then(() => phoneAlarm.pause()); document.getElementById('status').innerText = "✅ النظام جاهز للاستقبال"; }
        function clearData() { if(confirm("حذف كل البيانات؟")) { logsRef.remove(); document.getElementById('chat-box').innerHTML = ""; } }

        toggleCamera(); 
    </script>
</body>
</html>
